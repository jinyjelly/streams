<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>스트림스 타일 추첨기</title>
    <style>
        body {
            font-family: 'Pretendard', 'Malgun Gothic', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            background-color: #f4f7f6;
            margin: 0;
            padding: 20px;
        }
        h1 { color: #333; }
        #current-tile {
            font-size: 150px;
            font-weight: bold;
            color: #2c3e50;
            background-color: white;
            width: 300px;
            height: 300px;
            display: flex;
            justify-content: center;
            align-items: center;
            border-radius: 30px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
            margin: 30px 0;
            border: 5px solid #3498db;
        }
        .joker { color: #e74c3c !important; }
        .controls {
            display: flex;
            gap: 15px;
            margin-bottom: 30px;
        }
        button {
            font-size: 24px;
            padding: 15px 40px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
            transition: transform 0.1s, background-color 0.2s;
        }
        button:active { transform: scale(0.95); }
        #draw-btn {
            background-color: #3498db;
            color: white;
            box-shadow: 0 5px 15px rgba(52, 152, 219, 0.4);
        }
        #draw-btn:hover { background-color: #2980b9; }
        #draw-btn:disabled { background-color: #bdc3c7; cursor: not-allowed; box-shadow: none; }
        #reset-btn {
            background-color: #e74c3c;
            color: white;
            box-shadow: 0 5px 15px rgba(231, 76, 60, 0.4);
        }
        #reset-btn:hover { background-color: #c0392b; }
        .history-container {
            width: 100%;
            max-width: 800px;
            background: white;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
        }
        .history-title {
            font-size: 20px;
            font-weight: bold;
            margin-bottom: 15px;
            display: flex;
            justify-content: space-between;
        }
        #history-list {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }
        .history-item {
            background-color: #ecf0f1;
            padding: 10px 15px;
            border-radius: 8px;
            font-size: 20px;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <h1>스트림스 타일 추첨기</h1>
    
    <div id="current-tile">?</div>

    <div class="controls">
        <button id="draw-btn" onclick="drawTile()">타일 뽑기</button>
        <button id="reset-btn" onclick="initGame()">새 게임</button>
    </div>

    <div class="history-container">
        <div class="history-title">
            <span>나온 숫자 기록</span>
            <span id="remaining-count">남은 타일: 31개</span>
        </div>
        <div id="history-list"></div>
    </div>

    <script>
        let tiles = [];
        let history = [];

        function initGame() {
            // 1~30 숫자와 조커(★) 배열 생성
            tiles = Array.from({length: 30}, (_, i) => i + 1);
            tiles.push('★');
            history = [];
            
            document.getElementById('current-tile').innerText = '?';
            document.getElementById('current-tile').classList.remove('joker');
            document.getElementById('draw-btn').disabled = false;
            document.getElementById('draw-btn').innerText = '타일 뽑기';
            updateUI();
        }

        function drawTile() {
            if (tiles.length === 0) return;

            // 랜덤하게 인덱스 선택
            const randomIndex = Math.floor(Math.random() * tiles.length);
            const drawnTile = tiles.splice(randomIndex, 1)[0];
            history.push(drawnTile);

            // 화면 업데이트
            const tileDisplay = document.getElementById('current-tile');
            tileDisplay.innerText = drawnTile;
            
            if (drawnTile === '★') {
                tileDisplay.classList.add('joker');
            } else {
                tileDisplay.classList.remove('joker');
            }

            if (tiles.length === 0) {
                document.getElementById('draw-btn').disabled = true;
                document.getElementById('draw-btn').innerText = '종료';
            }

            updateUI();
        }

        function updateUI() {
            document.getElementById('remaining-count').innerText = `남은 타일: ${tiles.length}개`;
            
            const historyList = document.getElementById('history-list');
            historyList.innerHTML = '';
            history.forEach((tile, index) => {
                const span = document.createElement('span');
                span.className = 'history-item';
                span.innerText = `${index + 1}번째: ${tile}`;
                if(tile === '★') span.style.color = '#e74c3c';
                historyList.appendChild(span);
            });
        }

        // 초기화 실행
        initGame();
    </script>
</body>
</html>
