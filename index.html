<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>스트림스 추첨기</title>
    <style>
        body {
            font-family: 'Pretendard', 'Malgun Gothic', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            background-color: #fef0f7;
            margin: 0;
            padding: 20px;
            color: #4a4a4a;
            position: relative; 
        }
        
        #music-control {
            position: absolute;
            top: 20px;
            right: 20px;
            background-color: white;
            color: #f06292;
            border: 2px solid #f8bbd0;
            padding: 10px 15px;
            border-radius: 20px;
            cursor: pointer;
            font-weight: bold;
            font-size: 16px;
            box-shadow: 0 4px 10px rgba(240, 98, 146, 0.1);
            transition: all 0.2s;
        }
        #music-control:hover { background-color: #fce4ec; }

        h1 { color: #f06292; margin-bottom: 15px; font-weight: 800; margin-top: 40px; }
        
        /* 뽑은 횟수 강조 스타일 */
        .draw-counter {
            font-size: 32px;
            font-weight: 900;
            background-color: #fff;
            color: #d81b60;
            padding: 15px 40px;
            border-radius: 40px;
            border: 4px solid #f8bbd0;
            box-shadow: 0 8px 20px rgba(240, 98, 146, 0.2);
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        #current-count {
            font-size: 42px;
            color: #e91e63;
        }

        #current-tile {
            font-size: 160px;
            font-weight: bold;
            color: #4a4a4a;
            background-color: white;
            width: 260px;
            height: 260px;
            display: flex;
            justify-content: center;
            align-items: center;
            border-radius: 50px;
            box-shadow: 0 15px 40px rgba(240, 98, 146, 0.2);
            margin: 10px 0 30px 0;
            border: 10px solid #f8bbd0;
            transition: all 0.2s ease;
        }
        .joker { color: #ec407a !important; border-color: #ec407a !important; }
        .finished { border-color: #b0bec5 !important; background-color: #f5f5f5; color: #9e9e9e !important;}
        
        .controls {
            display: flex;
            gap: 20px;
            margin-bottom: 35px;
        }
        button.action-btn {
            font-size: 24px;
            padding: 18px 50px;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            font-weight: bold;
            transition: transform 0.1s, opacity 0.2s, background-color 0.2s;
        }
        button.action-btn:active { transform: scale(0.96); }
        #draw-btn {
            background-color: #f06292;
            color: white;
            box-shadow: 0 8px 20px rgba(240, 98, 146, 0.4);
        }
        #draw-btn:hover { background-color: #ec407a; }
        #draw-btn:disabled { background-color: #b0bec5; cursor: not-allowed; box-shadow: none;}
        #reset-btn {
            background-color: white;
            color: #f06292;
            border: 3px solid #f8bbd0;
        }
        #reset-btn:hover { background-color: #fce4ec; }
        
        .history-container {
            width: 100%;
            max-width: 600px;
            background: white;
            padding: 30px;
            border-radius: 30px;
            box-shadow: 0 5px 25px rgba(240, 98, 146, 0.1);
        }
        .history-title {
            font-size: 20px;
            font-weight: bold;
            color: #f06292;
            margin-bottom: 25px;
            padding-bottom: 12px;
            border-bottom: 3px solid #f8bbd0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        #remaining-tiles { font-size: 14px; color: #880e4f; font-weight: normal;}
        #history-list {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            justify-content: center;
        }
        .history-item {
            background-color: #fce4ec;
            padding: 15px 20px;
            border-radius: 15px;
            font-size: 22px;
            font-weight: bold;
            color: #4a4a4a;
            min-width: 35px;
            text-align: center;
        }
        .joker-history { color: #ec407a; }
    </style>
</head>
<body>

    <audio id="bgm" loop>
        <source src="bgm.mp3" type="audio/mpeg">
    </audio>

    <button id="music-control" onclick="toggleMusic()">🎵 배경음악 켜기</button>

    <h1>스트림스 타일 추첨기</h1>
    
    <div class="draw-counter">
        뽑은 횟수: <span id="current-count">0</span> / 20
    </div>
    
    <div id="current-tile">?</div>

    <div class="controls">
        <button id="draw-btn" class="action-btn" onclick="drawTile()">타일 뽑기</button>
        <button id="reset-btn" class="action-btn" onclick="initGame()">초기화</button>
    </div>

    <div class="history-container">
        <div class="history-title">
            <span>뽑힌 타일 기록</span>
            <span id="remaining-tiles">남은 타일: 40개</span>
        </div>
        <div id="history-list"></div>
    </div>

    <script>
        let tiles = [];
        let history = [];
        const MAX_DRAWS = 20;
        
        let isMusicPlaying = false;
        const bgm = document.getElementById('bgm');

        function toggleMusic() {
            const musicBtn = document.getElementById('music-control');
            if (isMusicPlaying) {
                bgm.pause();
                musicBtn.innerText = "🎵 배경음악 켜기";
                isMusicPlaying = false;
            } else {
                bgm.play();
                musicBtn.innerText = "🔇 배경음악 끄기";
                isMusicPlaying = true;
            }
        }

        function initGame() {
            tiles = [];
            for (let i = 1; i <= 10; i++) tiles.push(i);
            for (let i = 11; i <= 19; i++) { tiles.push(i); tiles.push(i); }
            for (let i = 20; i <= 30; i++) tiles.push(i);
            tiles.push('★');
            
            history = [];
            
            const tileDisplay = document.getElementById('current-tile');
            tileDisplay.innerText = '?';
            tileDisplay.className = '';
            document.getElementById('draw-btn').disabled = false;
            document.getElementById('draw-btn').innerText = "타일 뽑기";
            
            document.getElementById('current-count').innerText = "0";
            document.getElementById('current-count').style.color = "#e91e63";
            
            updateUI();
        }

        function drawTile() {
            if (history.length >= MAX_DRAWS || tiles.length === 0) return;

            const randomIndex = Math.floor(Math.random() * tiles.length);
            const drawnTile = tiles.splice(randomIndex, 1)[0];
            history.push(drawnTile);

            const tileDisplay = document.getElementById('current-tile');
            tileDisplay.innerText = drawnTile;
            
            if (drawnTile === '★') {
                tileDisplay.classList.add('joker');
            } else {
                tileDisplay.classList.remove('joker');
            }

            // 뽑은 횟수 업데이트
            document.getElementById('current-count').innerText = history.length;

            if (history.length >= MAX_DRAWS) {
                document.getElementById('draw-btn').disabled = true;
                document.getElementById('draw-btn').innerText = "게임 종료";
                document.getElementById('current-count').style.color = "#9e9e9e"; // 종료 시 색상 변경
                tileDisplay.classList.add('finished');
            }

            updateUI();
        }

        function updateUI() {
            document.getElementById('remaining-tiles').innerText = `남은 타일: ${tiles.length}개`;
            
            const historyList = document.getElementById('history-list');
            historyList.innerHTML = '';
            history.forEach((tile) => {
                const div = document.createElement('div');
                div.className = 'history-item';
                div.innerText = tile;
                if(tile === '★') div.classList.add('joker-history');
                historyList.appendChild(div);
            });
        }

        initGame();
    </script>
</body>
</html>
